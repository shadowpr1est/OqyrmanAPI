name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.SERVER_PATH }}
            COMPOSE_PROJECT_NAME=oqyrman
            git pull origin main

            # Ensure infra is available for migrations and app startup.
            docker compose -p $COMPOSE_PROJECT_NAME -f docker-compose.prod.yml up -d --no-recreate postgres minio

            # Run migrations on every deploy (idempotent with migrate tool).
            docker compose -p $COMPOSE_PROJECT_NAME -f docker-compose.prod.yml run --rm migrate

            docker compose -p $COMPOSE_PROJECT_NAME -f docker-compose.prod.yml build app
            docker compose -p $COMPOSE_PROJECT_NAME -f docker-compose.prod.yml up -d --no-deps app
            docker image prune -f
