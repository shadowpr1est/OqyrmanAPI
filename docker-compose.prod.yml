version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oqyrman_app
    env_file:
      - .env
    expose:
      - "${APP_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - oqyrman_net


  admin:
    build:
      context: ../oqyrman-admin
      dockerfile: Dockerfile
    container_name: oqyrman_admin
    expose:
      - "3001"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.oqyrman.app/api/v1
      - PORT=3001
    restart: unless-stopped
    networks:
      - oqyrman_net

  frontend:
    build:
      context: ../Oqyrman-frontend
      dockerfile: Dockerfile
    container_name: oqyrman_frontend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - oqyrman_net

  migrate:
    image: migrate/migrate:latest
    container_name: oqyrman_migrate
    volumes:
      - ./migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}
      up
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    restart: on-failure
    networks:
      - oqyrman_net

  postgres:
    image: postgres:16-alpine
    container_name: oqyrman_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - oqyrman_net

  minio:
    image: minio/minio:latest
    container_name: oqyrman_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BROWSER_REDIRECT_URL: https://api.oqyrman.app/minio-console
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - oqyrman_net

  minio_init:
    image: minio/mc:latest
    container_name: oqyrman_minio_init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/$${MINIO_BUCKET};
        mc anonymous set download local/$${MINIO_BUCKET};
        echo 'Bucket $${MINIO_BUCKET} ready';
      "
    networks:
      - oqyrman_net

  nginx:
    image: nginx:alpine
    container_name: oqyrman_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
      - frontend

    restart: unless-stopped
    networks:
      - oqyrman_net

volumes:
  postgres_data:
  minio_data:

networks:
  oqyrman_net: