version: '3.8'

services:

  # Backend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oqyrman_app
    env_file:
      - .env
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - oqyrman_net

  # Migrations
  migrate:
    image: migrate/migrate:latest
    container_name: oqyrman_migrate
    volumes:
      - ./migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}
      up
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    restart: on-failure
    networks:
      - oqyrman_net

  # postgres
  postgres:
    image: postgres:16-alpine
    container_name: oqyrman_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - oqyrman_net

  # minio
  minio:
    image: minio/minio:latest
    container_name: oqyrman_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web консоль
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - oqyrman_net

  # minio init for bucket creation
  minio_init:
    image: minio/mc:latest
    container_name: oqyrman_minio_init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/$${MINIO_BUCKET};
        mc anonymous set download local/$${MINIO_BUCKET};
        echo 'Bucket $${MINIO_BUCKET} ready';
      "
    networks:
      - oqyrman_net

volumes:
  postgres_data:
  minio_data:

networks:
  oqyrman_net:
    driver: bridge