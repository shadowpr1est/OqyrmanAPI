info:
  contact: {}
  description: API для книжной платформы Oqyrman
  title: OqyrmanAPI
  version: "1.0"
paths:
  /admin/authors:
    post:
      consumes:
      - application/json
      parameters:
      - description: Данные автора
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/author.createAuthorRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/author.authorResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Создать автора
      tags:
      - authors
  /admin/authors/{id}:
    delete:
      parameters:
      - description: ID автора
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Удалить автора
      tags:
      - authors
    put:
      consumes:
      - application/json
      parameters:
      - description: ID автора
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/author.updateAuthorRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/author.authorResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Обновить автора
      tags:
      - authors
  /admin/book-files/{id}:
    delete:
      parameters:
      - description: ID файла
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Удалить файл
      tags:
      - book-files
  /admin/book-files/upload:
    post:
      consumes:
      - multipart/form-data
      description: 'Загружает файл в MinIO. Допустимые форматы: pdf, epub, mp3.'
      parameters:
      - description: ID книги
        in: formData
        name: book_id
        required: true
        type: string
      - description: 'Формат файла: pdf | epub | mp3'
        in: formData
        name: format
        required: true
        type: string
      - description: Кол-во страниц (только для PDF/EPUB)
        in: formData
        name: total_pages
        type: integer
      - description: Файл
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/book_file.bookFileResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Файл данного типа уже загружен для этой книги
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Загрузить файл книги
      tags:
      - book-files
  /admin/books:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: ID автора
        in: formData
        name: author_id
        required: true
        type: string
      - description: ID жанра
        in: formData
        name: genre_id
        required: true
        type: string
      - description: Название
        in: formData
        name: title
        required: true
        type: string
      - description: ISBN
        in: formData
        name: isbn
        type: string
      - description: Описание
        in: formData
        name: description
        type: string
      - description: Язык
        in: formData
        name: language
        type: string
      - description: Год
        in: formData
        name: year
        type: integer
      - description: Обложка (jpg, png)
        in: formData
        name: cover
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/book.bookResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Создать книгу
      tags:
      - books
  /admin/books/{id}:
    delete:
      parameters:
      - description: ID книги
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Удалить книгу
      tags:
      - books
    put:
      consumes:
      - application/json
      parameters:
      - description: ID книги
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/book.updateBookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book.bookResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Обновить книгу
      tags:
      - books
  /admin/books/{id}/cover:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: ID книги
        in: path
        name: id
        required: true
        type: string
      - description: Обложка (jpg, png)
        in: formData
        name: cover
        required: true
        type: file
      produces:
      - application/json
