basePath: /api/v1
definitions:
  ai.chatRequest:
    properties:
      message:
        type: string
    required:
    - message
    type: object
  ai.chatResponse:
    properties:
      reply:
        type: string
    type: object
  ai.recommendResponse:
    properties:
      recommendations:
        type: string
    type: object
  auth.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  auth.registerRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
    required:
    - email
    - password
    - phone
    type: object
  auth.tokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  author.authorResponse:
    properties:
      bio:
        type: string
      birth_date:
        type: string
      death_date:
        type: string
      id:
        type: string
      name:
        type: string
      photo_url:
        type: string
    type: object
  author.createAuthorRequest:
    properties:
      bio:
        type: string
      birth_date:
        description: '"2006-01-02"'
        type: string
      death_date:
        description: '"2006-01-02"'
        type: string
      name:
        type: string
      photo_url:
        type: string
    required:
    - name
    type: object
  author.listAuthorResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/author.authorResponse'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  author.updateAuthorRequest:
    properties:
      bio:
        type: string
      birth_date:
        type: string
      death_date:
        type: string
      name:
        type: string
      photo_url:
        type: string
    type: object
  book.bookResponse:
    properties:
      author_id:
        type: string
      avg_rating:
        type: number
      cover_url:
        type: string
      description:
        type: string
      genre_id:
        type: string
      id:
        type: string
      isbn:
        type: string
      language:
        type: string
      title:
        type: string
      year:
        type: integer
    type: object
  book.listBookResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/book.bookResponse'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  book.updateBookRequest:
    properties:
      author_id:
        type: string
      avg_rating:
        type: number
      cover_url:
        type: string
      description:
        type: string
      genre_id:
        type: string
      isbn:
        type: string
      language:
        type: string
      title:
        type: string
      year:
        type: integer
    type: object
  book_file.bookFileResponse:
    properties:
      book_id:
        type: string
      file_url:
        type: string
      format:
        type: string
      id:
        type: string
      is_audio:
        type: boolean
    type: object
  genre.createGenreRequest:
    properties:
      name:
        type: string
      slug:
        type: string
    required:
    - name
    - slug
    type: object
  genre.genreResponse:
    properties:
      id:
        type: string
      name:
        type: string
      slug:
        type: string
    type: object
  genre.updateGenreRequest:
    properties:
      name:
        type: string
      slug:
        type: string
    type: object
  library.createLibraryRequest:
    properties:
      address:
        type: string
      lat:
        type: number
      lng:
        type: number
      name:
        type: string
      phone:
        type: string
    required:
    - address
    - lat
    - lng
    - name
    type: object
  library.libraryResponse:
    properties:
      address:
        type: string
      id:
        type: string
      lat:
        type: number
      lng:
        type: number
      name:
        type: string
      phone:
        type: string
    type: object
  library.listLibraryResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/library.libraryResponse'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  library.updateLibraryRequest:
    properties:
      address:
        type: string
      lat:
        type: number
      lng:
        type: number
      name:
        type: string
      phone:
        type: string
    type: object
  library_book.createLibraryBookRequest:
    properties:
      available_copies:
        type: integer
      book_id:
        type: string
      library_id:
        type: string
      total_copies:
        type: integer
    required:
    - available_copies
    - book_id
    - library_id
    - total_copies
    type: object
  library_book.libraryBookResponse:
    properties:
      available_copies:
        type: integer
      book_id:
        type: string
      id:
        type: string
      library_id:
        type: string
      total_copies:
        type: integer
    type: object
  library_book.updateLibraryBookRequest:
    properties:
      available_copies:
        type: integer
      total_copies:
        type: integer
    type: object
  notes.createNoteRequest:
    properties:
      book_id:
        type: string
      content:
        type: string
      page:
        type: integer
    required:
    - book_id
    - content
    - page
    type: object
  notes.noteResponse:
    properties:
      book_id:
        type: string
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      page:
        type: integer
      user_id:
        type: string
    type: object
  notes.updateNoteRequest:
    properties:
      content:
        type: string
      page:
        type: integer
    type: object
  reading_session.readingSessionResponse:
    properties:
      book_id:
        type: string
      current_page:
        type: integer
      id:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  reading_session.upsertReadingSessionRequest:
    properties:
      book_id:
        type: string
      current_page:
        type: integer
      status:
        enum:
        - reading
        - finished
        - dropped
        type: string
    required:
    - book_id
    - current_page
    - status
    type: object
  review.createReviewRequest:
    properties:
      body:
        type: string
      book_id:
        type: string
      rating:
        maximum: 5
        minimum: 1
        type: integer
    required:
    - body
    - book_id
    - rating
    type: object
  review.listReviewResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/review.reviewResponse'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  review.reviewResponse:
    properties:
      body:
        type: string
      book_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      rating:
        type: integer
      user_id:
        type: string
    type: object
  review.updateReviewRequest:
    properties:
      body:
        type: string
      rating:
        maximum: 5
        minimum: 1
        type: integer
    type: object
  stats.statsResponse:
    properties:
      authors_total:
        type: integer
      books_total:
        type: integer
      reservations_active:
        type: integer
      reservations_pending:
        type: integer
      reservations_total:
        type: integer
      reviews_total:
        type: integer
      users_total:
        type: integer
    type: object
  user.updateRoleRequest:
    properties:
      library_id:
        description: обязателен для Staff, null для остальных
        type: string
      role:
        enum:
        - Admin
        - Staff
        - User
        type: string
    required:
    - role
    type: object
  user.updateUserRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      phone:
        type: string
    type: object
  user.userResponse:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
      phone:
        type: string
      qr_code:
        type: string
      role:
        type: string
    type: object
  wishlist.addWishlistRequest:
    properties:
      book_id:
        type: string
    required:
    - book_id
    type: object
  wishlist.wishlistResponse:
    properties:
      added_at:
        type: string
      book_id:
        type: string
      id:
        type: string
      user_id:
        type: string
    type: object
info:
  contact: {}
  description: API для книжной платформы Oqyrman
  title: OqyrmanAPI
  version: "1.0"
paths:
  /admin/authors:
    post:
      consumes:
      - application/json
      parameters:
      - description: Данные автора
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/author.createAuthorRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/author.authorResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Создать автора
      tags:
      - authors
  /admin/authors/{id}:
    delete:
      parameters:
      - description: ID автора
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Удалить автора
      tags:
      - authors
    put:
      consumes:
      - application/json
      parameters:
      - description: ID автора
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/author.updateAuthorRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/author.authorResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Обновить автора
      tags:
      - authors
  /admin/book-files/{id}:
    delete:
      parameters:
      - description: ID файла
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Удалить файл
      tags:
      - book-files
  /admin/book-files/upload:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: ID книги
        in: formData
        name: book_id
        required: true
        type: string
      - description: 'Формат: pdf, epub, mp3'
        in: formData
        name: format
        required: true
        type: string
      - description: Аудиофайл?
        in: formData
        name: is_audio
        type: boolean
      - description: Файл
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/book_file.bookFileResponse'
      security:
      - BearerAuth: []
      summary: Загрузить файл книги в S3
      tags:
      - book-files
  /admin/books:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: ID автора
        in: formData
        name: author_id
        required: true
        type: string
      - description: ID жанра
        in: formData
        name: genre_id
        required: true
        type: string
      - description: Название
        in: formData
        name: title
        required: true
        type: string
      - description: ISBN
        in: formData
        name: isbn
        type: string
      - description: Описание
        in: formData
        name: description
        type: string
      - description: Язык
        in: formData
        name: language
        type: string
      - description: Год
        in: formData
        name: year
        type: integer
      - description: Обложка (jpg, png)
        in: formData
        name: cover
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/book.bookResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Создать книгу
      tags:
      - books
  /admin/books/{id}:
    delete:
      parameters:
      - description: ID книги
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Удалить книгу
      tags:
      - books
    put:
      consumes:
      - application/json
      parameters:
      - description: ID книги
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/book.updateBookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book.bookResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Обновить книгу
      tags:
      - books
  /admin/books/{id}/cover:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: ID книги
        in: path
        name: id
        required: true
        type: string
      - description: Обложка (jpg, png)
        in: formData
        name: cover
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book.bookResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Загрузить обложку книги
      tags:
      - books
  /admin/genres:
    post:
      consumes:
      - application/json
      parameters:
      - description: Данные жанра
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/genre.createGenreRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/genre.genreResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Создать жанр
      tags:
      - genres
  /admin/genres/{id}:
    delete:
      parameters:
      - description: ID жанра
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Удалить жанр
      tags:
      - genres
    put:
      consumes:
      - application/json
      parameters:
      - description: ID жанра
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/genre.updateGenreRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/genre.genreResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Обновить жанр
      tags:
      - genres
  /admin/libraries:
    post:
      consumes:
      - application/json
      parameters:
      - description: Данные библиотеки
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/library.createLibraryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/library.libraryResponse'
      security:
      - BearerAuth: []
      summary: Создать библиотеку
      tags:
      - libraries
  /admin/libraries/{id}:
    delete:
      parameters:
      - description: ID библиотеки
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Удалить библиотеку
      tags:
      - libraries
    put:
      consumes:
      - application/json
      parameters:
      - description: ID библиотеки
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/library.updateLibraryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/library.libraryResponse'
      security:
      - BearerAuth: []
      summary: Обновить библиотеку
      tags:
      - libraries
  /admin/library-books:
    post:
      consumes:
      - application/json
      parameters:
      - description: Данные
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/library_book.createLibraryBookRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/library_book.libraryBookResponse'
      security:
      - BearerAuth: []
      summary: Добавить книгу в библиотеку
      tags:
      - library-books
  /admin/library-books/{id}:
    delete:
      parameters:
      - description: ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Удалить запись
      tags:
      - library-books
    put:
      consumes:
      - application/json
      parameters:
      - description: ID
        in: path
        name: id
        required: true
        type: string
      - description: Данные
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/library_book.updateLibraryBookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/library_book.libraryBookResponse'
      security:
      - BearerAuth: []
      summary: Обновить копии
      tags:
      - library-books
  /admin/stats:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/stats.statsResponse'
      security:
      - BearerAuth: []
      summary: Статистика платформы
      tags:
      - stats
  /admin/users:
    get:
      parameters:
      - default: 20
        description: Лимит
        in: query
        name: limit
        type: integer
      - default: 0
        description: Смещение
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Список пользователей
      tags:
      - users
  /admin/users/{id}:
    delete:
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Удалить пользователя (admin)
      tags:
      - users
  /admin/users/{id}/role:
    patch:
      consumes:
      - application/json
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: string
      - description: Новая роль
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/user.updateRoleRequest'
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Изменить роль пользователя
      tags:
      - users
  /ai/chat:
    post:
      consumes:
      - application/json
      description: Отвечает на вопросы пользователя по книгам и чтению
      parameters:
      - description: Сообщение пользователя
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/ai.chatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ai.chatResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Чат с книжным ассистентом
      tags:
      - ai
  /ai/recommend:
    post:
      description: Генерирует рекомендации на основе истории чтения и вишлиста пользователя
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ai.recommendResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Персональные рекомендации книг
      tags:
      - ai
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email и пароль
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.tokenResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Вход
      tags:
      - auth
  /auth/logout:
    post:
