events {
    worker_connections 1024;
}

http {
    client_max_body_size 100M;

    client_body_timeout 60s;
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;

    # imgproxy cache: 1GB, inactive entries removed after 30 days
    proxy_cache_path /var/cache/nginx/imgproxy
                     levels=1:2
                     keys_zone=imgproxy_cache:10m
                     max_size=1g
                     inactive=30d
                     use_temp_path=off;

    server {
        listen 80;
        server_name oqyrman.app www.oqyrman.app api.oqyrman.app admin.oqyrman.app;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name oqyrman.app www.oqyrman.app;

        ssl_certificate     /etc/letsencrypt/live/oqyrman.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/oqyrman.app/privkey.pem;

        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name api.oqyrman.app;

        ssl_certificate     /etc/letsencrypt/live/api.oqyrman.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.oqyrman.app/privkey.pem;

        location /img/ {
            proxy_pass http://imgproxy:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # allow imgproxy time to download & process large originals
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # disk cache
            proxy_cache            imgproxy_cache;
            proxy_cache_key        $uri;
            proxy_cache_valid      200 30d;
            proxy_cache_valid      404 1m;
            proxy_cache_lock       on;
            proxy_cache_use_stale  error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location /minio/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /minio-console/ {
            proxy_pass http://minio:9001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_buffering off;
        }

        # SSE stream — long-lived connection, no buffering, 24h timeout
        location /api/v1/notifications/stream {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            chunked_transfer_encoding off;
        }

        location / {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name admin.oqyrman.app;

        ssl_certificate     /etc/letsencrypt/live/admin.oqyrman.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.oqyrman.app/privkey.pem;

        location / {
            proxy_pass http://admin:3001;  
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}